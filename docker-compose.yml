x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile

  image: project-airflow:latest
  restart: unless-stopped

  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER_airflow}:${POSTGRES_PASSWORD_airflow}@postgres_airflow:5432/${POSTGRES_DB_airflow}

    AIRFLOW__CORE__FERNET_KEY: ""

    AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"

    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config

  networks:
    - dataflow_network

services:
  postgres_airflow:
    image: postgres:18
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER_airflow} -d ${POSTGRES_DB_airflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      POSTGRES_USER: ${POSTGRES_USER_airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_airflow}
      POSTGRES_DB: ${POSTGRES_DB_airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql
    networks:
      - dataflow_network

  postgres_warehouse:
    image: postgres:18
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER_warehouse} -d ${POSTGRES_DB_warehouse}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      POSTGRES_USER: ${POSTGRES_USER_warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_warehouse}
      POSTGRES_DB: ${POSTGRES_DB_warehouse}
    ports:
      - "5433:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql
    networks:
      - dataflow_network

  airflow-init:
    <<: *airflow-common
    restart: "no"
    command: bash -c "airflow db migrate && bash /docker/airflow/scripts/init.sh"
    volumes:
      - ./docker/airflow/scripts:/docker/airflow/scripts:ro
    depends_on:
      postgres_airflow:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data:
  postgres_warehouse_data:

networks:
  dataflow_network:
